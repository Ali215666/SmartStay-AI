services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: smartstay-qwen
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

